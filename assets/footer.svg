<svg width="1000" height="160" viewBox="0 0 1000 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fadeline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00f0ff"/>
      <stop offset="1" stop-color="#ff2d95" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05070f"/>
      <stop offset="1" stop-color="#0a1226"/>
    </linearGradient>
    <pattern id="fgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#0d1c30" stroke-width="1"/>
    </pattern>
    <clipPath id="fframe"><rect width="1000" height="160" rx="12"/></clipPath>
  </defs>

  <style>
    text { font-family: 'Consolas','Courier New',monospace; }
    .cmd { font-size: 15px; fill: #8aa3c2; }
    .kw  { fill: #00f0ff; }
    .quote { font-size: 20px; fill: #eaf6ff; letter-spacing: 3px; font-weight: bold; }
    .eof { font-size: 64px; font-weight: bold; fill: #101d33; letter-spacing: 6px; }
    .f1 { animation: fadein .3s ease .4s both; }
    .f2 { animation: fadein .3s ease 1.1s both; }
    .f3 { animation: fadein .3s ease 1.8s both; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    .cursor { animation: blink 1s steps(2,start) infinite 2.2s, fadein .1s ease 2.2s both; }
    @keyframes blink { to { visibility: hidden; } }
  </style>

  <g clip-path="url(#fframe)">
    <rect width="1000" height="160" fill="url(#fbg)"/>
    <rect width="1000" height="160" fill="url(#fgrid)" opacity="0.6"/>
    <rect x="0" y="0" width="1000" height="2" fill="url(#fadeline)"/>
    <text x="972" y="120" text-anchor="end" class="eof">EOF</text>

    <text x="48" y="52" class="cmd f1"><tspan class="kw">&gt;</tspan> echo $MANTRA</text>
    <text x="48" y="92" class="quote f2">BUILD · BREAK · REBUILD · SHIP</text>
    <text x="48" y="128" class="cmd f3"><tspan class="kw">&gt;</tspan> connection to lrecodex closed — see you in the next commit</text>
    <rect x="606" y="116" width="9" height="15" fill="#00f0ff" class="cursor"/>
  </g>
  <rect x="0.5" y="0.5" width="999" height="159" rx="12" stroke="#14263f"/>
</svg>
